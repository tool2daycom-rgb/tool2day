<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 150" fill="none" role="img" aria-label="Tool2Day">
  <defs>
    <clipPath id="barShort">
      <rect x="88" y="86" width="26" height="46" rx="13"/>
    </clipPath>
  </defs>
  <!-- Rising bars -->
  <rect x="88" y="86" width="26" height="46" rx="13" fill="#5B9BF5"/>
  <rect x="120" y="56" width="26" height="76" rx="13" fill="#F5C518"/>
  <rect x="152" y="28" width="26" height="104" rx="13" fill="#E8874A"/>
  <!-- Lens -->
  <circle cx="58" cy="66" r="44" fill="#F5C518"/>
  <!-- Violet overlap (distinct from Google red) -->
  <circle cx="58" cy="66" r="44" fill="#7C6AF2" clip-path="url(#barShort)"/>
  <!-- Handle outside, mirrored angle -->
  <line
    x1="28" y1="98"
    x2="6" y2="132"
    stroke="#E8874A"
    stroke-width="16"
    stroke-linecap="round"
  />
</svg>
